name: EcoCity 360 - CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    name: Build e Testes Automatizados
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código (Checkout)
        uses: actions/checkout@v3

      - name: Configurar o .NET 8
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restaurar dependências
        run: dotnet restore

      - name: Compilar o projeto (Build)
        run: dotnet build --no-restore --configuration Release

      - name: Rodar Testes Unitários (Test)
        run: dotnet test --no-build --configuration Release --verbosity normal
  
  deploy-staging:
    name: Deploy Staging
    needs: build-and-test 
    runs-on: ubuntu-latest
    environment:
      name: Staging
      url: https://github.com 
    
    steps:
      - name: Baixar o código
        uses: actions/checkout@v3

      - name: Build da Imagem Docker
        run: docker build -t ecocity-api:staging -f EcoCity/Dockerfile ./EcoCity

      - name: Simular entrega no servidor
        run: echo "Imagem gerada e implantada no ambiente de Staging com sucesso!"
    
    deploy-producao:
      name: Deploy Produção
      needs: deploy-staging 
      runs-on: ubuntu-latest
      environment:
        name: Produção
        url: https://github.com
      
      steps:
        - name: Baixar o código
          uses: actions/checkout@v3

        - name: Build da Imagem Docker (Produção)
          run: docker build -t ecocity-api:latest -f EcoCity/Dockerfile ./EcoCity

        - name: Simular entrega no servidor
          run: echo "Imagem de Produção gerada e implantada com sucesso!"